<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AmanyuAI</title>
</head>
<body>
  <h1>🧠 AmanyuAI</h1>
  <textarea id="userInput" rows="4" cols="50" placeholder="Type your message..."></textarea>
  <br/>
  <button onclick="sendMessage()">Send</button>
  <h3>Reply:</h3>
  <p id="aiReply">Waiting...</p>

  <script>
    async function sendMessage() {
      const message = document.getElementById("userInput").value;

      const response = await fetch(https://replit.com/@amanyuu/amanyuai-backend", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await response.json();
      document.getElementById("aiReply").innerText = data.reply;
    }
  </script>
</body>
</html>
